<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTS 스튜디오</title>
<style>
body {font-family:sans-serif;padding:20px;background:#f5f5f5;}
textarea{width:100%;height:120px;font-size:16px;margin-bottom:10px;}
button{padding:10px;margin:5px;font-size:14px;cursor:pointer;}
</style>
</head>
<body>

<h2>TTS 스튜디오 (감정 버전)</h2>

<textarea id="txt" placeholder="텍스트 입력"></textarea>

<div>
  <button onclick="setEmotion('normal')">기본</button>
  <button onclick="setEmotion('sad')">😢 슬픔</button>
  <button onclick="setEmotion('happy')">😊 밝음</button>
  <button onclick="setEmotion('excited')">🔥 흥분</button>
  <button onclick="setEmotion('serious')">😐 진지</button>
</div>

<div>
  <button onclick="play()">▶ 재생</button>
  <button onclick="stop()">■ 정지</button>
</div>

<script>
const synth = window.speechSynthesis;
let currentEmotion = 'normal';

function setEmotion(type){
  currentEmotion = type;
  alert("감정: " + type);
}

function speakSequenceAdvanced(text){
  const sentences = text
    .replace(/\n/g,' ')
    .split(/([.!?…]|,)/)
    .reduce((acc,cur,i,arr)=>{
      if(i%2===0) acc.push(cur+(arr[i+1]||''));
      return acc;
    },[])
    .map(s=>s.trim())
    .filter(s=>s.length>0);

  let i=0;

  function next(){
    if(i>=sentences.length) return;

    const s = sentences[i];
    const u = new SpeechSynthesisUtterance(s);

    let rate=1, pitch=1;

    if(currentEmotion==='sad'){
      rate=0.8; pitch=0.85;
    }else if(currentEmotion==='happy'){
      rate=1.05; pitch=1.2;
    }else if(currentEmotion==='excited'){
      rate=1.15; pitch=1.25;
    }else if(currentEmotion==='serious'){
      rate=0.9; pitch=0.95;
    }

    if(s.includes('!')){ rate+=0.05; pitch+=0.1; }
    if(s.includes('?')){ pitch+=0.1; }
    if(s.includes('...')||s.includes('…')){ rate-=0.1; }

    u.rate = rate;
    u.pitch = pitch;
    u.lang = "ko-KR";

    u.onend = ()=>{ i++; next(); };

    synth.speak(u);
  }

  next();
}

function play(){
  const txt = document.getElementById("txt").value.trim();
  if(!txt){ alert("텍스트 입력하세요"); return; }

  synth.cancel();
  speakSequenceAdvanced(txt);
}

function stop(){
  synth.cancel();
}
</script>

</body>
</html>
